<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <clipPath id="clapper-clip">
      <rect x="5" y="7" width="38" height="14" rx="2"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="9" fill="#0d0d0d"/>

  <!-- Clapper top: red base with dark diagonal stripes -->
  <rect x="5" y="7" width="38" height="14" rx="2" fill="#e50914"/>
  <g clip-path="url(#clapper-clip)">
    <polygon points="5,21 11,21 19,7 13,7" fill="#111"/>
    <polygon points="19,21 25,21 33,7 27,7" fill="#111"/>
    <polygon points="33,21 39,21 47,7 41,7" fill="#111"/>
  </g>

  <!-- Separator between clapper and body -->
  <rect x="5" y="20" width="38" height="3" fill="#0d0d0d" opacity="0.7"/>

  <!-- Clapperboard body -->
  <rect x="5" y="22" width="38" height="21" rx="2" fill="#1c1c1c"/>

  <!-- Film sprocket holes — left -->
  <rect x="5" y="26" width="5" height="5" rx="1" fill="#0d0d0d"/>
  <rect x="5" y="34" width="5" height="5" rx="1" fill="#0d0d0d"/>

  <!-- Film sprocket holes — right -->
  <rect x="38" y="26" width="5" height="5" rx="1" fill="#0d0d0d"/>
  <rect x="38" y="34" width="5" height="5" rx="1" fill="#0d0d0d"/>
</svg>
